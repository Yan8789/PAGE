<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 網頁即時預覽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        textarea {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-publish {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-publish:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
        }

        .btn-clear:hover {
            background: #ff5252;
        }

        .preview-section {
            flex: 1;
            padding: 20px;
            overflow: auto;
            background: #fafafa;
        }

        #preview {
            background: white;
            border-radius: 8px;
            padding: 20px;
            min-height: 100%;
            border: 1px solid #e0e0e0;
        }

        .status-message {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 編輯面板 -->
        <div class="panel">
            <div class="panel-header">📝 HTML 代碼編輯</div>
            <div class="panel-content">
                <div class="editor-section">
                    <textarea id="htmlInput" placeholder="請貼上你的 HTML 代碼..."></textarea>
                    <div class="button-group">
                        <button class="btn-publish" onclick="publishHTML()">🚀 發布</button>
                        <button class="btn-clear" onclick="clearHTML()">🗑️ 清空</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 預覽面板 -->
        <div class="panel">
            <div class="panel-header">👁️ 網頁預覽</div>
            <div class="panel-content">
                <div class="preview-section">
                    <div id="statusContainer"></div>
                    <div id="preview">
                        <div class="empty-state">貼上 HTML 代碼後按「發布」開始預覽</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'savedHTML';
        const htmlInput = document.getElementById('htmlInput');
        const preview = document.getElementById('preview');
        const statusContainer = document.getElementById('statusContainer');

        // 頁面加載時獲取保存的內容
        function loadSavedHTML() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                htmlInput.value = saved;
                renderPreview(saved);
            }
        }

        // 發布 HTML
        function publishHTML() {
            const htmlCode = htmlInput.value.trim();
            
            if (!htmlCode) {
                showStatus('請先輸入 HTML 代碼', 'error');
                return;
            }

            try {
                // 保存到 localStorage
                localStorage.setItem(STORAGE_KEY, htmlCode);
                
                // 渲染預覽
                renderPreview(htmlCode);
                
                // 顯示成功訊息
                showStatus('✅ 已成功發布！', 'success');
            } catch (error) {
                showStatus('❌ 發布失敗: ' + error.message, 'error');
            }
        }

        // 渲染預覽
        function renderPreview(htmlCode) {
            try {
                preview.innerHTML = htmlCode;
            } catch (error) {
                preview.innerHTML = `<div style="color: red; padding: 20px;"><strong>HTML 錯誤:</strong> ${error.message}</div>`;
            }
        }

        // 清空所有內容
        function clearHTML() {
            if (confirm('確定要清空所有內容嗎？')) {
                htmlInput.value = '';
                preview.innerHTML = '<div class="empty-state">貼上 HTML 代碼後按「發布」開始預覽</div>';
                localStorage.removeItem(STORAGE_KEY);
                showStatus('✅ 已清空所有內容', 'success');
            }
        }

        // 顯示狀態訊息
        function showStatus(message, type) {
            statusContainer.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            setTimeout(() => {
                statusContainer.innerHTML = '';
            }, 3000);
        }

        // 監聽 textarea 變化，實時更新預覽
        htmlInput.addEventListener('input', () => {
            // 可選：即時預覽（如果需要，取消下面的註解）
            // renderPreview(htmlInput.value);
        });

        // 初始化 - 加載保存的內容
        window.addEventListener('load', loadSavedHTML);
    </script>
</body>
</html>
